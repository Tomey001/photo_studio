{% extends 'base.html' %}

{% block title %}Admin Login — LensCraft Studio{% endblock %}

{% block content %}

<div class="login-card">

    <div class="text-center mb-4">
        <i class="bi bi-person-lock" style="font-size: 3rem; color: #0f3460;"></i>
        <h3 class="fw-bold mt-2">Admin Login</h3>
        <p class="text-muted">Studio administrators only</p>
    </div>

    <form method="POST" action="{{ url_for('admin_login') }}">

        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username"
                   name="username" placeholder="Enter admin username"
                   required autofocus>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password"
                   name="password" placeholder="Enter password"
                   required>
        </div>

        <button type="submit" class="btn btn-book">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>

    </form>

</div>

{% endblock %}
